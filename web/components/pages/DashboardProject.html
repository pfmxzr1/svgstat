<template x-if="currentPage === 'project-detail'">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in-up">
        <div x-show="!selectedProject" class="text-center py-12">
            <div class="animate-spin w-12 h-12 border-4 border-purple-200 border-purple-600 rounded-full mx-auto mb-4"></div>
            <p class="text-gray-600" x-text="t('loading')"></p>
        </div>

        <div x-show="selectedProject" class="space-y-8">
            <div>
                <button @click="navigate('/dashboard')" class="mb-6 inline-flex items-center rounded-lg border border-purple-200 bg-white px-4 py-2 text-purple-600 hover:bg-purple-50 hover:border-purple-300 hover:text-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-200 transition-colors">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    <span x-text="t('backToProjects')"></span>
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-6 stat-card">
                <div class="flex items-center justify-between gap-4 mb-4">
                    <h3 class="font-semibold text-gray-900" x-text="t('todayOverview')"></h3>
                    <div x-show="loadingStats" class="animate-spin w-5 h-5 border-2 border-purple-200 border-purple-600 rounded-full"></div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-gradient-to-br from-purple-50 to-purple-100 rounded-lg p-4">
                        <div class="text-3xl font-bold text-purple-600" x-text="projectStats.pv || 0"></div>
                        <div class="text-sm text-gray-600" x-text="t('pv')"></div>
                    </div>
                    <div class="bg-gradient-to-br from-blue-50 to-blue-100 rounded-lg p-4">
                        <div class="text-3xl font-bold text-blue-600" x-text="projectStats.uv || 0"></div>
                        <div class="text-sm text-gray-600" x-text="t('uv')"></div>
                    </div>
                    <div class="bg-gradient-to-br from-green-50 to-green-100 rounded-lg p-4">
                        <div class="text-3xl font-bold text-green-600" x-text="projectStats.requests || 0"></div>
                        <div class="text-sm text-gray-600" x-text="t('totalRequests')"></div>
                    </div>
                    <div class="bg-gradient-to-br from-orange-50 to-orange-100 rounded-lg p-4">
                        <div class="text-3xl font-bold text-orange-600" x-text="projectStats.bots || 0"></div>
                        <div class="text-sm text-gray-600" x-text="t('bots')"></div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-white rounded-xl shadow-sm p-6 stat-card">
                    <h3 class="font-semibold text-gray-900 mb-4" x-text="t('topCountries')"></h3>
                    <div class="space-y-3" x-show="getSortedEntries(projectStats.countries, 8).length > 0">
                        <template x-for="entry in getSortedEntries(projectStats.countries, 8)" :key="entry[0]">
                            <div class="flex items-center justify-between gap-4">
                                <span class="text-gray-700" x-text="entry[0]"></span>
                                <div class="flex items-center space-x-2">
                                    <div class="w-32 bg-gray-200 rounded-full h-2">
                                        <div class="bg-purple-500 h-2 rounded-full" :style="getBarStyle(entry[1], projectStats.countries)"></div>
                                    </div>
                                    <span class="text-sm text-gray-500 min-w-8 text-right" x-text="entry[1]"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                    <p x-show="getSortedEntries(projectStats.countries, 8).length === 0" class="text-gray-500 text-center py-4" x-text="t('noData')"></p>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6 stat-card">
                    <h3 class="font-semibold text-gray-900 mb-4" x-text="t('topPaths')"></h3>
                    <div class="space-y-3" x-show="getSortedEntries(projectStats.paths, 8).length > 0">
                        <template x-for="entry in getSortedEntries(projectStats.paths, 8)" :key="entry[0]">
                            <div class="flex items-center justify-between gap-4">
                                <span class="text-gray-700 truncate flex-1" x-text="entry[0]"></span>
                                <div class="flex items-center space-x-2 shrink-0">
                                    <div class="w-32 bg-gray-200 rounded-full h-2">
                                        <div class="bg-blue-500 h-2 rounded-full" :style="getBarStyle(entry[1], projectStats.paths)"></div>
                                    </div>
                                    <span class="text-sm text-gray-500 min-w-8 text-right" x-text="entry[1]"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                    <p x-show="getSortedEntries(projectStats.paths, 8).length === 0" class="text-gray-500 text-center py-4" x-text="t('noData')"></p>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6 stat-card">
                    <h3 class="font-semibold text-gray-900 mb-4" x-text="t('topDevices')"></h3>
                    <div class="space-y-3" x-show="getSortedEntries(projectStats.devices).length > 0">
                        <template x-for="entry in getSortedEntries(projectStats.devices)" :key="entry[0]">
                            <div class="flex items-center justify-between gap-4">
                                <span class="text-gray-700" x-text="entry[0]"></span>
                                <div class="flex items-center space-x-2">
                                    <div class="w-32 bg-gray-200 rounded-full h-2">
                                        <div class="bg-green-500 h-2 rounded-full" :style="getBarStyle(entry[1], projectStats.devices)"></div>
                                    </div>
                                    <span class="text-sm text-gray-500 min-w-8 text-right" x-text="entry[1]"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                    <p x-show="getSortedEntries(projectStats.devices).length === 0" class="text-gray-500 text-center py-4" x-text="t('noData')"></p>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6 stat-card">
                    <h3 class="font-semibold text-gray-900 mb-4" x-text="t('topBrowsers')"></h3>
                    <div class="space-y-3" x-show="getSortedEntries(projectStats.browsers).length > 0">
                        <template x-for="entry in getSortedEntries(projectStats.browsers)" :key="entry[0]">
                            <div class="flex items-center justify-between gap-4">
                                <span class="text-gray-700" x-text="entry[0]"></span>
                                <div class="flex items-center space-x-2">
                                    <div class="w-32 bg-gray-200 rounded-full h-2">
                                        <div class="bg-orange-500 h-2 rounded-full" :style="getBarStyle(entry[1], projectStats.browsers)"></div>
                                    </div>
                                    <span class="text-sm text-gray-500 min-w-8 text-right" x-text="entry[1]"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                    <p x-show="getSortedEntries(projectStats.browsers).length === 0" class="text-gray-500 text-center py-4" x-text="t('noData')"></p>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6 stat-card">
                    <h3 class="font-semibold text-gray-900 mb-4" x-text="t('topReferrers')"></h3>
                    <div class="space-y-3" x-show="getSortedEntries(projectStats.referrers, 8).length > 0">
                        <template x-for="entry in getSortedEntries(projectStats.referrers, 8)" :key="entry[0]">
                            <div class="flex items-center justify-between gap-4">
                                <span class="text-gray-700 truncate flex-1" x-text="entry[0]"></span>
                                <div class="flex items-center space-x-2 shrink-0">
                                    <div class="w-32 bg-gray-200 rounded-full h-2">
                                        <div class="bg-pink-500 h-2 rounded-full" :style="getBarStyle(entry[1], projectStats.referrers)"></div>
                                    </div>
                                    <span class="text-sm text-gray-500 min-w-8 text-right" x-text="entry[1]"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                    <p x-show="getSortedEntries(projectStats.referrers, 8).length === 0" class="text-gray-500 text-center py-4" x-text="t('noData')"></p>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6 stat-card">
                    <h3 class="font-semibold text-gray-900 mb-4" x-text="t('topIPs')"></h3>
                    <div class="space-y-3" x-show="getSortedEntries(projectStats.ips, 8).length > 0">
                        <template x-for="entry in getSortedEntries(projectStats.ips, 8)" :key="entry[0]">
                            <div class="flex items-center justify-between gap-4">
                                <span class="text-gray-700 font-mono text-sm" x-text="entry[0]"></span>
                                <div class="flex items-center space-x-2">
                                    <div class="w-32 bg-gray-200 rounded-full h-2">
                                        <div class="bg-cyan-500 h-2 rounded-full" :style="getBarStyle(entry[1], projectStats.ips)"></div>
                                    </div>
                                    <span class="text-sm text-gray-500 min-w-8 text-right" x-text="entry[1]"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                    <p x-show="getSortedEntries(projectStats.ips, 8).length === 0" class="text-gray-500 text-center py-4" x-text="t('noData')"></p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-6 stat-card">
                <div class="flex items-center justify-between gap-4 mb-4">
                    <h3 class="font-semibold text-gray-900" x-text="t('visitorDetails')"></h3>
                    <div class="flex items-center gap-3">
                        <span class="text-sm text-gray-500" x-text="`${t('recentVisitors')} / ${visitorsPage.total || 0} UV`"></span>
                        <span class="text-sm text-gray-400" x-show="visitorsPage.totalPages > 0" x-text="getVisitorPaginationText()"></span>
                    </div>
                </div>

                <div class="grid md:grid-cols-5 gap-3 mb-5">
                    <select x-model="visitorFilters.device" @change="applyVisitorFilters()" class="rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-purple-200">
                        <option value="" x-text="t('allDevices')"></option>
                        <option value="desktop">desktop</option>
                        <option value="mobile">mobile</option>
                        <option value="tablet">tablet</option>
                    </select>

                    <select x-model="visitorFilters.browser" @change="applyVisitorFilters()" class="rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-purple-200">
                        <option value="" x-text="t('allBrowsers')"></option>
                        <option value="chrome">chrome</option>
                        <option value="safari">safari</option>
                        <option value="firefox">firefox</option>
                        <option value="edge">edge</option>
                    </select>

                    <input
                        x-model="visitorFilters.path"
                        @keydown.enter.prevent="applyVisitorFilters()"
                        class="rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-purple-200"
                        :placeholder="t('pathPlaceholder')">

                    <select x-model="visitorFilters.sort" @change="applyVisitorFilters()" class="rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-purple-200">
                        <option value="last_seen_desc" x-text="t('sortRecent')"></option>
                        <option value="requests_desc" x-text="t('sortRequestsDesc')"></option>
                        <option value="requests_asc" x-text="t('sortRequestsAsc')"></option>
                    </select>

                    <div class="flex items-center gap-2">
                        <select x-model.number="visitorFilters.pageSize" @change="applyVisitorFilters()" class="flex-1 rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-purple-200">
                            <option :value="10">10</option>
                            <option :value="20">20</option>
                            <option :value="50">50</option>
                        </select>
                        <button @click="applyVisitorFilters()" class="inline-flex items-center rounded-lg border border-purple-200 bg-purple-50 px-3 py-2 text-sm text-purple-600 hover:border-purple-300 hover:bg-purple-100 transition-colors" x-text="t('applyFilters')"></button>
                        <button @click="resetVisitorFilters()" class="inline-flex items-center rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-gray-600 hover:border-purple-200 hover:text-purple-600 transition-colors" x-text="t('resetFilters')"></button>
                    </div>
                </div>

                <template x-if="loadingVisitors">
                    <div class="text-center py-6">
                        <div class="animate-spin w-6 h-6 border-2 border-purple-200 border-purple-600 rounded-full mx-auto mb-3"></div>
                        <p class="text-sm text-gray-500" x-text="t('visitorLoading')"></p>
                    </div>
                </template>

                <div x-show="!loadingVisitors && visitorsPage.items && visitorsPage.items.length > 0" class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-100">
                        <thead>
                            <tr class="text-left text-xs uppercase tracking-wide text-gray-400">
                                <th class="py-3 pr-4 font-medium" x-text="t('visitorId')"></th>
                                <th class="py-3 pr-4 font-medium" x-text="t('recentIp')"></th>
                                <th class="py-3 pr-4 font-medium" x-text="t('lastPath')"></th>
                                <th class="py-3 pr-4 font-medium" x-text="t('deviceBrowser')"></th>
                                <th class="py-3 pr-4 font-medium" x-text="t('location')"></th>
                                <th class="py-3 pr-4 font-medium" x-text="t('requestsCount')"></th>
                                <th class="py-3 pr-4 font-medium" x-text="t('firstSeen')"></th>
                                <th class="py-3 font-medium" x-text="t('lastSeen')"></th>
                            </tr>
                        </thead>
                        <template x-for="visitor in visitorsPage.items" :key="visitor.visitorId">
                            <tbody class="divide-y divide-gray-100">
                                    <tr class="align-top cursor-pointer hover:bg-gray-50 transition-colors" @click="toggleVisitorDetail(visitor.visitorId)">
                                        <td class="py-4 pr-4">
                                            <div class="flex items-center gap-2">
                                                <span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-purple-50 text-purple-600 text-xs font-semibold" x-text="expandedVisitorId === visitor.visitorId ? '-' : '+'"></span>
                                                <div class="font-mono text-sm text-gray-800" x-text="shortVisitorId(visitor.visitorId)"></div>
                                            </div>
                                        </td>
                                        <td class="py-4 pr-4">
                                            <div class="font-mono text-sm text-gray-700" x-text="visitor.ip || '-'"></div>
                                        </td>
                                        <td class="py-4 pr-4 max-w-xs">
                                            <div class="text-sm text-gray-700 break-all" x-text="visitor.path || '-'"></div>
                                        </td>
                                        <td class="py-4 pr-4">
                                            <div class="text-sm text-gray-700" x-text="`${visitor.deviceType || '-'} / ${visitor.browser || '-'}`"></div>
                                        </td>
                                        <td class="py-4 pr-4">
                                            <div class="text-sm text-gray-700" x-text="formatVisitorLocation(visitor)"></div>
                                        </td>
                                        <td class="py-4 pr-4">
                                            <div class="text-sm font-medium text-gray-800" x-text="visitor.requests || 0"></div>
                                        </td>
                                        <td class="py-4 pr-4">
                                            <div class="text-sm text-gray-600" x-text="formatDateTime(visitor.firstSeenAt)"></div>
                                        </td>
                                        <td class="py-4">
                                            <div class="text-sm text-gray-600" x-text="formatDateTime(visitor.lastSeenAt)"></div>
                                        </td>
                                    </tr>
                                    <tr x-show="expandedVisitorId === visitor.visitorId" class="bg-gray-50">
                                        <td colspan="8" class="px-4 py-4">
                                            <div class="grid md:grid-cols-3 gap-4">
                                                <div class="bg-white rounded-lg border border-gray-100 p-4">
                                                    <div class="text-xs uppercase tracking-wide text-gray-400 mb-2" x-text="t('fullVisitorId')"></div>
                                                    <div class="font-mono text-sm text-gray-700 break-all" x-text="visitor.visitorId || '-'"></div>
                                                </div>
                                                <div class="bg-white rounded-lg border border-gray-100 p-4">
                                                    <div class="text-xs uppercase tracking-wide text-gray-400 mb-2" x-text="t('visitorReferrer')"></div>
                                                    <div class="text-sm text-gray-700 break-all" x-text="visitor.referrer || '-'"></div>
                                                </div>
                                                <div class="bg-white rounded-lg border border-gray-100 p-4">
                                                    <div class="text-xs uppercase tracking-wide text-gray-400 mb-2" x-text="t('location')"></div>
                                                    <div class="text-sm text-gray-700 break-all" x-text="formatVisitorLocation(visitor)"></div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                            </tbody>
                        </template>
                    </table>
                </div>

                <div x-show="!loadingVisitors && visitorsPage.items && visitorsPage.items.length > 0" class="mt-5 flex items-center justify-between gap-4">
                    <button
                        @click="changeVisitorPage(visitorsPage.page - 1)"
                        :disabled="visitorsPage.page <= 1"
                        class="inline-flex items-center rounded-lg border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 hover:border-purple-200 hover:text-purple-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                        x-text="t('previousPage')">
                    </button>
                    <span class="text-sm text-gray-500" x-show="visitorsPage.totalPages > 0" x-text="getVisitorPaginationText()"></span>
                    <button
                        @click="changeVisitorPage(visitorsPage.page + 1)"
                        :disabled="visitorsPage.totalPages === 0 || visitorsPage.page >= visitorsPage.totalPages"
                        class="inline-flex items-center rounded-lg border border-purple-200 bg-purple-50 px-4 py-2 text-sm text-purple-600 hover:border-purple-300 hover:bg-purple-100 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                        x-text="t('nextPage')">
                    </button>
                </div>

                <p x-show="!loadingVisitors && (!visitorsPage.items || visitorsPage.items.length === 0)" class="text-gray-500 text-center py-6" x-text="t('noData')"></p>
            </div>
        </div>
    </div>
</template>
