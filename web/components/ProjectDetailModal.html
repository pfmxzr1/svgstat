<template x-if="showCodeModal && selectedProject">
    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 overflow-y-auto" @click.self="closeCodeModal()">
        <div class="bg-white rounded-2xl p-6 w-full max-w-4xl mx-4 my-8 fade-in-up" @click.stop>
            <div class="flex items-start justify-between gap-4 mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-gray-900" x-text="selectedProject.name"></h2>
                    <p class="text-sm text-gray-500 mt-2" x-text="selectedProject.slug"></p>
                </div>
                <button @click="closeCodeModal()" class="rounded-lg border border-gray-200 bg-white p-2 text-gray-400 hover:bg-gray-50 hover:border-gray-300 hover:text-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-200 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="grid lg:grid-cols-2 gap-6">
                <div class="bg-gray-50 rounded-xl p-5 space-y-4">
                    <h3 class="text-lg font-semibold text-gray-900" x-text="t('counterSvg')"></h3>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" x-text="t('metricName')"></label>
                        <input x-model="codeSettings.counterName" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent" :placeholder="t('metricNamePlaceholder')">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" x-text="t('displayLabel')"></label>
                        <input x-model="codeSettings.counterLabel" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent" :placeholder="t('displayLabelPlaceholder')">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" x-text="t('colorOptional')"></label>
                        <input x-model="codeSettings.counterColor" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent" :placeholder="t('colorPlaceholder')">
                    </div>
                    <div>
                        <div class="text-sm font-medium text-gray-700 mb-2" x-text="t('preview')"></div>
                        <div class="bg-white border rounded-lg p-4 min-h-16 flex items-center">
                            <img :src="getCounterSvgPath()" class="h-8" alt="Counter preview">
                        </div>
                    </div>
                    <div>
                        <div class="text-sm font-medium text-gray-700 mb-2" x-text="t('svgLink')"></div>
                        <div class="bg-white border rounded-lg p-3 flex items-center justify-between gap-4">
                            <code class="text-sm text-gray-600 break-all" x-text="getCounterSvgUrl()"></code>
                            <button @click="copyText(getCounterSvgUrl())" class="px-3 py-1 rounded-lg border border-purple-200 bg-purple-50 text-purple-600 hover:bg-purple-100 hover:border-purple-300 hover:text-purple-800 shrink-0 focus:outline-none focus:ring-2 focus:ring-purple-200 transition-colors" x-text="t('copy')"></button>
                        </div>
                    </div>
                    <div>
                        <div class="text-sm font-medium text-gray-700 mb-2" x-text="t('markdownCode')"></div>
                        <div class="bg-white border rounded-lg p-3 flex items-center justify-between gap-4">
                            <code class="text-sm text-gray-600 break-all" x-text="getCounterMarkdown()"></code>
                            <button @click="copyText(getCounterMarkdown())" class="px-3 py-1 rounded-lg border border-purple-200 bg-purple-50 text-purple-600 hover:bg-purple-100 hover:border-purple-300 hover:text-purple-800 shrink-0 focus:outline-none focus:ring-2 focus:ring-purple-200 transition-colors" x-text="t('copy')"></button>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-50 rounded-xl p-5 space-y-4">
                    <h3 class="text-lg font-semibold text-gray-900" x-text="t('badgeSvg')"></h3>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" x-text="t('metricName')"></label>
                        <input x-model="codeSettings.badgeName" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent" :placeholder="t('metricNamePlaceholder')">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" x-text="t('displayLabel')"></label>
                        <input x-model="codeSettings.badgeLabel" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent" :placeholder="t('displayLabelPlaceholder')">
                    </div>
                    <div class="grid sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" x-text="t('colorOptional')"></label>
                            <input x-model="codeSettings.badgeColor" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent" :placeholder="t('colorPlaceholder')">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" x-text="t('badgeStyle')"></label>
                            <select x-model="codeSettings.badgeStyle" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                                <option value="" x-text="t('badgeStyleFlat')"></option>
                                <option value="flat-square" x-text="t('badgeStyleFlatSquare')"></option>
                                <option value="plastic" x-text="t('badgeStylePlastic')"></option>
                                <option value="for-the-badge" x-text="t('badgeStyleForTheBadge')"></option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <div class="text-sm font-medium text-gray-700 mb-2" x-text="t('preview')"></div>
                        <div class="bg-white border rounded-lg p-4 min-h-16 flex items-center">
                            <img :src="getBadgeSvgPath()" class="h-5" alt="Badge preview">
                        </div>
                    </div>
                    <div>
                        <div class="text-sm font-medium text-gray-700 mb-2" x-text="t('svgLink')"></div>
                        <div class="bg-white border rounded-lg p-3 flex items-center justify-between gap-4">
                            <code class="text-sm text-gray-600 break-all" x-text="getBadgeSvgUrl()"></code>
                            <button @click="copyText(getBadgeSvgUrl())" class="px-3 py-1 rounded-lg border border-purple-200 bg-purple-50 text-purple-600 hover:bg-purple-100 hover:border-purple-300 hover:text-purple-800 shrink-0 focus:outline-none focus:ring-2 focus:ring-purple-200 transition-colors" x-text="t('copy')"></button>
                        </div>
                    </div>
                    <div>
                        <div class="text-sm font-medium text-gray-700 mb-2" x-text="t('markdownCode')"></div>
                        <div class="bg-white border rounded-lg p-3 flex items-center justify-between gap-4">
                            <code class="text-sm text-gray-600 break-all" x-text="getBadgeMarkdown()"></code>
                            <button @click="copyText(getBadgeMarkdown())" class="px-3 py-1 rounded-lg border border-purple-200 bg-purple-50 text-purple-600 hover:bg-purple-100 hover:border-purple-300 hover:text-purple-800 shrink-0 focus:outline-none focus:ring-2 focus:ring-purple-200 transition-colors" x-text="t('copy')"></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-end pt-6">
                <button @click="closeCodeModal()" class="px-6 py-2 rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-50 hover:border-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-200 transition-colors" x-text="t('close')"></button>
            </div>
        </div>
    </div>
</template>
