<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVGStat - Live SVG Counters, Badges, and Project Analytics</title>
    <meta name="keywords" content="SVGStat pricing, SVG counter pricing, SVG badge pricing, free SVG counter, affordable SVG badges, GitHub SVG counter, website badge generator, SVG analytics pricing">
    <meta name="description" content="SVGStat helps you publish live SVG counters, customizable badges, and actionable analytics for GitHub, docs, dashboards, and websites with production-ready demo endpoints.">
    
    <script>
        (function() {
            const savedLang = localStorage.getItem('svgstat-lang')
                || ((navigator.language || 'en').toLowerCase().startsWith('en') ? 'en' : 'zh');
            document.documentElement.lang = savedLang;
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" x-cloak x-data="spaApp()">
        <div id="navbar-container"></div>
        <div class="page-transition" id="page-container"></div>
        <div id="modals-container"></div>

        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[70] pointer-events-none">
            <div
                x-show="toast.show"
                x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-y-3 scale-95"
                x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-y-0 scale-100"
                x-transition:leave-end="opacity-0 translate-y-3 scale-95"
                class="flex items-center gap-2.5 rounded-xl px-5 py-3.5 shadow-2xl text-sm font-medium text-white"
                :class="toast.type === 'error' ? 'bg-red-500' : 'bg-gray-900'"
                style="display: none;">
                <span x-show="toast.type !== 'error'" class="inline-flex h-5 w-5 items-center justify-center rounded-full bg-green-500 shrink-0">
                    <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
                    </svg>
                </span>
                <span x-show="toast.type === 'error'" class="inline-flex h-5 w-5 items-center justify-center rounded-full bg-white/20 shrink-0">
                    <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </span>
                <span x-text="toast.message"></span>
            </div>
        </div>
    </div>

    <script src="/static/js/translations.js"></script>
    <script src="/static/js/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
